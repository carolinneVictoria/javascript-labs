<!doctype html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adopet</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header>
        <h1>Adopet - Encontre seu novo amigo</h1>
    </header>
    <main>
        <section class="form-container">
            <h2>Cadastro de novo pet</h2>
            <form id="cadastro-pet-form">
                <input type="hidden" id="pet-id" />
                <div class="input-group">
                    <label for="pet-nome">Nome</label>
                    <input type="text" id="pet-nome" name="nome" placeholder="Nome do pet" required />
                </div>
                <div class="input-group">
                    <label for="pet-especie">Espécie</label>
                    <input type="text" id="pet-especie" name="especie" placeholder="Cão, gato, etc." required />
                </div>
                <div class="input-group">
                    <label for="pet-raca">Raça</label>
                    <input type="text" id="pet-raca" name="raca" placeholder="Raça do pet" required />
                </div>
                <div class="button-group">
                    <button type="submit" id="botao-cadastrar">Cadastrar</button>
                    <button type="button" id="botao-cancelar">Cancelar</button>
                </div>
            </form>
        </section>

        <section class="pets-list-section">
            <h2>Pets disponíveis</h2>
            <ul id="lista-pets"></ul>
        </section>

    </main>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
